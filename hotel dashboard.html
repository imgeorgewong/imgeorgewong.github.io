<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Operations Alert Dashboard · 2025年1-2月</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #e8eaf0;
    --muted: #7a7f9a;
    --accent: #4d7cfe;
    --red: #ff4d4f;
    --red-bg: rgba(255,77,79,0.12);
    --yellow: #faad14;
    --yellow-bg: rgba(250,173,20,0.12);
    --green: #52c41a;
    --green-bg: rgba(82,196,26,0.12);
    --gray-bg: rgba(120,120,140,0.12);
    --font: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.5; }

  /* Layout */
  .page { max-width: 1400px; margin: 0 auto; padding: 20px; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 18px; font-weight: 600; color: var(--text); }
  .header .subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .header .tag { background: var(--surface2); border: 1px solid var(--border2); border-radius: 4px; padding: 3px 10px; font-size: 11px; color: var(--muted); }

  /* Summary cards */
  .summary-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 20px; }
  .sum-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .sum-card .label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .sum-card .val { font-size: 22px; font-weight: 600; }
  .sum-card.red .val { color: var(--red); }
  .sum-card.yellow .val { color: var(--yellow); }
  .sum-card.green .val { color: var(--green); }
  .sum-card .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* Controls */
  .controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .controls select, .controls input { background: var(--surface); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); padding: 6px 10px; font-size: 12px; outline: none; cursor: pointer; }
  .controls select:hover, .controls select:focus { border-color: var(--accent); }
  .ctrl-label { font-size: 11px; color: var(--muted); }

  /* Main grid */
  .main-grid { display: grid; grid-template-columns: 1fr 1.8fr; gap: 16px; }

  /* Region panel */
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 500; display: flex; justify-content: space-between; align-items: center; }
  .panel-header .hint { font-size: 11px; color: var(--muted); font-weight: 400; }

  /* Region rows */
  .region-list { overflow-y: auto; max-height: 520px; }
  .region-row { display: grid; grid-template-columns: 100px 1fr 36px 36px 36px; gap: 8px; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
  .region-row:hover, .region-row.active { background: var(--surface2); }
  .region-row .rname { font-size: 12px; font-weight: 500; }
  .region-row .rcount { font-size: 11px; color: var(--muted); }
  .bar-wrap { height: 6px; border-radius: 3px; background: var(--bg); overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .dot { width: 28px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
  .dot.r { background: var(--red-bg); color: var(--red); }
  .dot.y { background: var(--yellow-bg); color: var(--yellow); }
  .dot.g { background: var(--green-bg); color: var(--green); }

  /* Hotel table */
  .hotel-panel { display: flex; flex-direction: column; }
  .table-wrap { overflow-y: auto; flex: 1; max-height: 520px; }
  table { width: 100%; border-collapse: collapse; }
  th { position: sticky; top: 0; background: var(--surface); padding: 9px 10px; text-align: left; font-size: 11px; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border2); white-space: nowrap; }
  td { padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 12px; vertical-align: middle; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  tr.selected td { background: rgba(77,124,254,0.08); }
  tr.selected td:first-child { border-left: 2px solid var(--accent); }

  /* Light badges */
  .light { display: inline-block; width: 22px; height: 18px; border-radius: 3px; text-align: center; line-height: 18px; font-size: 10px; font-weight: 700; }
  .light.r { background: var(--red-bg); color: var(--red); }
  .light.y { background: var(--yellow-bg); color: var(--yellow); }
  .light.g { background: var(--green-bg); color: var(--green); }
  .light.d { background: var(--gray-bg); color: var(--muted); }
  .lights-row { display: flex; gap: 3px; }

  .red-badge { background: var(--red); color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 10px; font-weight: 700; }

  /* Detail drawer */
  .detail-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-top: 16px; display: none; }
  .detail-panel.show { display: block; }
  .detail-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .detail-header h3 { font-size: 14px; font-weight: 600; }
  .detail-header .close-btn { cursor: pointer; color: var(--muted); font-size: 16px; padding: 4px; }
  .detail-header .close-btn:hover { color: var(--text); }
  .detail-body { padding: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  /* Metric blocks */
  .metric-block { background: var(--surface2); border-radius: 8px; padding: 14px; }
  .metric-block .m-title { font-size: 11px; color: var(--muted); margin-bottom: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .metric-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .metric-row:last-child { margin-bottom: 0; }
  .metric-row .mk { font-size: 12px; color: var(--muted); }
  .metric-row .mv { font-size: 13px; font-weight: 500; }
  .metric-row .mv.red { color: var(--red); }
  .metric-row .mv.yellow { color: var(--yellow); }
  .metric-row .mv.green { color: var(--green); }

  .progress-bar { height: 4px; border-radius: 2px; background: var(--bg); margin-top: 4px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }

  /* Cost chart */
  .cost-block { grid-column: span 1; }
  .cost-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .cost-row .cost-name { width: 60px; font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .cost-row .cost-bar-wrap { flex: 1; height: 8px; border-radius: 4px; background: var(--bg); overflow: hidden; position: relative; }
  .cost-row .cost-bar { height: 100%; border-radius: 4px; }
  .cost-row .cost-val { width: 60px; font-size: 11px; text-align: right; flex-shrink: 0; }
  .cost-row .cost-val.red { color: var(--red); }
  .cost-row .cost-val.green { color: var(--green); }
  .budget-line { position: absolute; top: 0; height: 100%; width: 2px; background: var(--border2); }

  .section-title { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .insight-box { background: rgba(255,77,79,0.06); border: 1px solid rgba(255,77,79,0.2); border-radius: 6px; padding: 10px 12px; font-size: 12px; color: var(--text); line-height: 1.6; margin-top: 8px; grid-column: span 3; }
  .insight-box .insight-icon { color: var(--red); margin-right: 6px; }

  /* Filter tabs */
  .filter-tabs { display: flex; gap: 4px; }
  .ftab { padding: 4px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); color: var(--muted); background: transparent; transition: all 0.15s; }
  .ftab:hover { border-color: var(--border2); color: var(--text); }
  .ftab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ftab.r-tab.active { background: var(--red); border-color: var(--red); }
  .ftab.y-tab.active { background: var(--yellow); border-color: var(--yellow); color: #000; }
  .ftab.g-tab.active { background: var(--green); border-color: var(--green); }

  /* Legend */
  .legend { display: flex; gap: 16px; align-items: center; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .leg-dot { width: 8px; height: 8px; border-radius: 2px; }

  @media (max-width: 1000px) {
    .main-grid { grid-template-columns: 1fr; }
    .summary-grid { grid-template-columns: repeat(3, 1fr); }
    .detail-body { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

<div class="page">
  <div class="header">
    <div>
      <h1>Hotel Operations Alert Dashboard</h1>
      <div class="subtitle">Anonymised Demo · Jan–Feb 2025 Rolling Data · 543 Operating Properties</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <div class="legend">
        <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div>Red</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--yellow)"></div>Amber</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div>Green</div>
      </div>
      <div class="tag">Demo Data</div>
    </div>
  </div>

  <div class="summary-grid" id="sumGrid"></div>

  <div class="controls">
    <span class="ctrl-label">Region</span>
    <select id="regionFilter"><option value="">All Regions</option></select>
    <span class="ctrl-label">Tier</span>

    <select id="brandFilter"><option value="">All Brands</option></select>

      <div class="ftab r-tab" data-level="3+">3 Red+</div>
      <div class="ftab r-tab" data-level="2+">2 Red+</div>
      <div class="ftab r-tab" data-level="1+">有Red</div>
    </div>
  </div>

  <div class="main-grid">
    <div class="panel">
      <div class="panel-header">
        <span>Regional Overview</span>
        <span class="hint">Click region to filter</span>
      </div>
      <div class="region-list" id="regionList"></div>

    <div class="panel hotel-panel">

        <span id="hotelPanelTitle">Property List</span>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Property</th><th>Region</th><th>Tier</th>

              <th title="Rolling 12M EBITDA%">EBITDA</th>
              <th title="Monthly RGI Avg">RGI</th>
              <th title="Renewal Risk">Renewal</th>
              <th title="CAPEX Status">Capex</th>
              <th>Red数</th>
            </tr>
          </thead>
          <tbody id="hotelTbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <div>
        <h3 id="detailTitle"></h3>
        <div style="font-size:11px;color:var(--muted);margin-top:2px" id="detailSub"></div>
      </div>
      <span class="close-btn" onclick="closeDetail()">✕</span>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

// ── helpers ──────────────────────────────────────────────────────────────────
const REGIONS = [...new Set(HD.map(d=>d.r))].sort();
const TIERS = [...new Set(HD.map(d=>d.t))].filter(Boolean).sort();
const BRANDS = [...new Set(HD.map(d=>d.b))].filter(Boolean).sort();

const LIGHT_LABEL = {r:'Red',y:'Amber',g:'Green',d:'—',undefined:'—'};
const REGION_COLORS = {
  '华东':'#4d7cfe','华北':'#9b59b6','华西':'#f39c12','华南':'#2ecc71',
  '华中':'#e74c3c','东北':'#1abc9c','国际酒店品牌':'#e67e22','南部区':'#3498db',
  '北部区':'#95a5a6','西部区':'#d35400','禧玥':'#8e44ad','花间堂':'#27ae60',
  '品质精选':'#2980b9','美仑':'#c0392b','中高端酒店':'#16a085'
};
function rc(r){ return REGION_COLORS[r]||'#4d7cfe'; }

function lightClass(l){ return l==='r'?'r':l==='y'?'y':l==='g'?'g':'d'; }
function redCount(d){ return [d.gl,d.el,d.rl,d.nl].filter(l=>l==='r').length; }

let activeRegion = null;
let activeLevel = 'all';
let selectedHotel = null;

// ── populate filters ─────────────────────────────────────────────────────────
function populateFilters(){
  const rf = document.getElementById('regionFilter');
  REGIONS.forEach(r=>{ const o=document.createElement('option');o.value=r;o.textContent=r;rf.appendChild(o); });
  const tf = document.getElementById('tierFilter');
  TIERS.forEach(t=>{ const o=document.createElement('option');o.value=t;o.textContent=t;tf.appendChild(o); });
  const bf = document.getElementById('brandFilter');
  BRANDS.forEach(b=>{ const o=document.createElement('option');o.value=b;o.textContent=b;bf.appendChild(o); });
  rf.addEventListener('change',()=>{activeRegion=rf.value||null;render();});
  tf.addEventListener('change',render);
  bf.addEventListener('change',render);
}

// ── get filtered data ─────────────────────────────────────────────────────────
function filtered(){
  const rf=document.getElementById('regionFilter').value;
  const tf=document.getElementById('tierFilter').value;
  const bf=document.getElementById('brandFilter').value;
  return HD.filter(d=>{
    if(rf && d.r!==rf) return false;
    if(tf && d.t!==tf) return false;
    if(bf && d.b!==bf) return false;
    const rc=redCount(d);
    if(activeLevel==='3+' && rc<3) return false;
    if(activeLevel==='2+' && rc<2) return false;
    if(activeLevel==='1+' && rc<1) return false;
    return true;
  });
}

// ── summary cards ─────────────────────────────────────────────────────────────
function renderSummary(data){
  const total=data.length;
  const red3=data.filter(d=>redCount(d)>=3).length;
  const red2=data.filter(d=>redCount(d)>=2).length;
  const red1=data.filter(d=>redCount(d)>=1).length;
  const gopRed=data.filter(d=>d.gl==='r').length;
  const ebitdaRed=data.filter(d=>d.el==='r').length;
  const renewalRed=data.filter(d=>d.nl==='r').length;
  document.getElementById('sumGrid').innerHTML=`
    <div class="sum-card"><div class="label">Active Properties</div><div class="val" style="color:var(--text)">${total}</div><div class="sub">Operating</div></div>
    <div class="sum-card red"><div class="label">≥3 Red Flags</div><div class="val">${red3}</div><div class="sub">${pct(red3,total)}% of properties</div></div>
    <div class="sum-card red"><div class="label">≥2 Red</div><div class="val">${red2}</div><div class="sub">Requires attention</div></div>
    <div class="sum-card yellow"><div class="label">GOPRed</div><div class="val" style="color:var(--yellow)">${gopRed}</div><div class="sub">Completion <81%</div></div>
    <div class="sum-card red"><div class="label">EBITDARed</div><div class="val">${ebitdaRed}</div><div class="sub">Rolling 12M <0%</div></div>
    <div class="sum-card red"><div class="label">High Renewal Risk</div><div class="val">${renewalRed}</div><div class="sub">Immediate follow-up</div></div>
  `;
}
function pct(a,b){ return b?Math.round(a/b*100):0; }

// ── region list ───────────────────────────────────────────────────────────────
function renderRegions(data){
  const byRegion={};
  data.forEach(d=>{
    if(!byRegion[d.r])byRegion[d.r]={total:0,red:0,yellow:0,green:0};
    const s=byRegion[d.r];
    s.total++;
    const rl=d.gl;
    if(rl==='r')s.red++;else if(rl==='y')s.yellow++;else if(rl==='g')s.green++;
  });
  const sorted=Object.entries(byRegion).sort((a,b)=>b[1].red-a[1].red);
  const maxRed=Math.max(...sorted.map(([,v])=>v.red),1);
  document.getElementById('regionList').innerHTML=sorted.map(([r,v])=>`
    <div class="region-row${activeRegion===r?' active':''}" onclick="selectRegion('${r}')">
      <div>
        <div class="rname">${r}</div>
        <div class="rcount">${v.total} properties</div>
      </div>
      <div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${pct(v.red,v.total)}%;background:var(--red);opacity:0.8"></div></div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">GOPRed ${pct(v.red,v.total)}%</div>
      </div>
      <div class="dot r">${v.red}</div>
      <div class="dot y">${v.yellow}</div>
      <div class="dot g">${v.green}</div>
    </div>
  `).join('');
}

function selectRegion(r){
  if(activeRegion===r){ activeRegion=null; document.getElementById('regionFilter').value=''; }
  else{ activeRegion=r; document.getElementById('regionFilter').value=r; }
  render();
}

// ── hotel table ───────────────────────────────────────────────────────────────
function renderHotels(data){
  const sorted=[...data].sort((a,b)=>redCount(b)-redCount(a)||(b.gl==='r'?1:0)-(a.gl==='r'?1:0));
  document.getElementById('hotelCount').textContent=`${sorted.length} properties`;
  document.getElementById('hotelPanelTitle').textContent=activeRegion?`${activeRegion} · Property List`:'Property List';

  document.getElementById('hotelTbody').innerHTML=sorted.map(d=>{
    const rc=redCount(d);
    const rcBadge=rc>0?`<span class="red-badge">${rc}</span>`:`<span style="color:var(--muted);font-size:11px">0</span>`;
    return `<tr class="${selectedHotel===d.i?'selected':''}" onclick="selectHotel(${d.i})" style="cursor:pointer">
      <td style="font-weight:500">${d.n}</td>
      <td style="color:var(--muted);font-size:11px">${(d.r||'').replace('公司','')}</td>
      <td><span style="font-size:11px;color:var(--muted)">${d.t||''}</span></td>
      <td><span class="light ${lightClass(d.gl)}">${fmt1(d.gv)}</span></td>
      <td><span class="light ${lightClass(d.el)}">${fmtPct1(d.ev)}</span></td>
      <td><span class="light ${lightClass(d.rl)}">${d.rv?d.rv.toFixed(2):'—'}</span></td>
      <td><span class="light ${lightClass(d.nl)}">${renewalLabel(d.nv)}</span></td>
      <td><span class="light ${lightClass(d.cl)}">${d.cv&&d.cv!=='N/A'?'有':'—'}</span></td>
      <td>${rcBadge}</td>
    </tr>`;
  }).join('');
}

function fmt1(v){ return v!=null?Math.round(v*100)+'%':'—'; }
function fmtPct1(v){ return v!=null?Math.round(v*100)+'%':'—'; }
function renewalLabel(v){
  if(!v||v==='normal'||v==='0')return '—';
  if(v==='高风险')return 'Hi';
  if(v==='需关注')return 'Mid';
  if(v==='正常')return 'Low';
  return v.substring(0,3);
}

// ── detail panel ──────────────────────────────────────────────────────────────
function selectHotel(id){
  selectedHotel=selectedHotel===id?null:id;
  if(selectedHotel==null){ closeDetail(); render(); return; }
  render();
  const d=HD.find(h=>h.i===id);
  if(!d) return;
  showDetail(d);
}

function closeDetail(){
  selectedHotel=null;
  document.getElementById('detailPanel').classList.remove('show');
  render();
}

function colorForVal(v,good,warn){
  if(v==null) return '';
  if(v<good) return 'red';
  if(v<warn) return 'yellow';
  return 'green';
}

function showDetail(d){
  document.getElementById('detailTitle').textContent=`${d.n} · Performance Analysis`;
  document.getElementById('detailSub').textContent=`${d.r} · ${d.t||''} · ${d.b||''}`;
  document.getElementById('detailPanel').classList.add('show');

  // Insight text
  const issues=[];
  if(d.gl==='r') issues.push(`GOP Completion only ${fmt1(d.gv)} (target >97%)`);
  if(d.el==='r') issues.push(`Rolling EBITDA% ${fmtPct1(d.ev)} (target >5%)`);
  if(d.rl==='r') issues.push(`RGI Index ${d.rv?d.rv.toFixed(2):'—'} (threshold 0.80)`);
  if(d.nl==='r') issues.push(`High Renewal Risk`);
  const revenueIssue=d.rev!=null&&d.rev<0.9;
  const costIssue=d.exp!=null&&d.exp>1.1;
  let rootCause='';
  if(revenueIssue&&costIssue) rootCause='Both revenue shortfall and cost overrun detected. Recommend addressing occupancy/pricing strategy alongside cost controls.';
  else if(revenueIssue) rootCause='Primary driver appears to be revenue underperformance. Focus on occupancy and pricing strategy.';
  else if(costIssue) rootCause='Primary driver: cost overrun. Review Labour, Energy, Rooms and Sales expenses line by line.';
  else if(issues.length) rootCause='Operating metrics show anomalies. Recommend a performance review meeting with regional management.';

  // Cost excess bars
  const costs=[
    {name:'Labor',exc:d.lc,budget:null},
    {name:'Energy',exc:d.ec,budget:null},
    {name:'Rooms',exc:d.rc,budget:null},
    {name:'Sales',exc:d.sc,budget:null},
  ];
  const maxCostAbs=Math.max(...costs.map(c=>Math.abs(c.exc||0)),1);

  function costBar(c){
    const v=c.exc;
    if(v==null) return `<div class="cost-row"><div class="cost-name">${c.name}</div><div class="cost-bar-wrap"><div class="cost-bar" style="width:0%;background:var(--muted)"></div></div><div class="cost-val">—</div></div>`;
    const isOver=v>0;
    const pctW=Math.min(Math.abs(v)/maxCostAbs*100,100);
    const color=isOver?'var(--red)':'var(--green)';
    const vStr=isOver?`+${fmtK(v)}`:`${fmtK(v)}`;
    const cls=isOver?'red':'green';
    return `<div class="cost-row"><div class="cost-name">${c.name}</div><div class="cost-bar-wrap"><div class="cost-bar" style="width:${pctW}%;background:${color}"></div></div><div class="cost-val ${cls}">${vStr}</div></div>`;
  }
  function fmtK(v){ return Math.abs(v)>=10000?Math.round(v/10000)+'w':Math.round(v)+''; }

  function metricRow(label,actual,budget,unit='%',isRatio=true){
    const av=actual!=null?(isRatio?Math.round(actual*100)+'%':actual.toFixed(1)+unit):'—';
    const bv=budget!=null?(isRatio?Math.round(budget*100)+'%':budget.toFixed(1)+unit):'—';
    const cls=actual!=null&&budget!=null&&isRatio?(actual>=budget*0.95?'green':actual>=budget*0.85?'yellow':'red'):'';
    return `<div class="metric-row"><div class="mk">${label}</div><div class="mv ${cls}">${av}</div></div>
    <div class="metric-row"><div class="mk" style="font-size:10px;color:var(--muted)">Budget</div><div class="mv" style="font-size:11px;color:var(--muted)">${bv}</div></div>`;
  }

  const gopColor=d.gl==='r'?'red':d.gl==='y'?'yellow':'green';
  const ebitdaColor=d.el==='r'?'red':d.el==='y'?'yellow':'green';
  const rgiColor=d.rl==='r'?'red':d.rl==='y'?'yellow':'green';

  document.getElementById('detailBody').innerHTML=`
    <div class="metric-block">
      <div class="m-title">L1 Metrics · Profitability</div>
      <div class="metric-row"><div class="mk">GOP Completion</div><div class="mv ${gopColor}">${fmt1(d.gv)}</div></div>
      <div class="progress-bar" style="margin-bottom:10px"><div class="progress-fill" style="width:${Math.min((d.gv||0)*100,150)}%;background:${gopColor==='red'?'var(--red)':gopColor==='yellow'?'var(--yellow)':'var(--green)'}"></div></div>
      <div class="metric-row"><div class="mk">Rolling EBITDA%</div><div class="mv ${ebitdaColor}">${fmtPct1(d.ev)}</div></div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:8px">Threshold: 0% (Red) · 5% (Amber/Green)</div>
      <div class="metric-row"><div class="mk">Monthly Avg RGI</div><div class="mv ${rgiColor}">${d.rv?d.rv.toFixed(2):'—'}</div></div>
      <div style="font-size:10px;color:var(--muted)">Threshold: 0.80 (Red) · 0.95 (Amber/Green)</div>
    </div>

    <div class="metric-block">
      <div class="m-title">L2 Metrics · Revenue Breakdown</div>
      ${metricRow('Revenue Completion',d.rev,null,'',true)}
      <div style="border-top:1px solid var(--border);margin:8px 0"></div>
      ${metricRow('Occupancy Rate',d.occ,d.occb,'',true)}
      ${metricRow('Average Daily Rate',d.adr,d.adrb,' CNY',false)}
      <div style="font-size:10px;color:var(--muted);margin-top:4px">RevPAR YoY: <span class="${d.rpyoy!=null&&d.rpyoy>0?'green':'red'}">${d.rpyoy!=null?(d.rpyoy>0?'+':'')+Math.round(d.rpyoy*100)+'%':'—'}</span></div>
    </div>

    <div class="metric-block cost-block">
      <div class="m-title">L3 Metrics · Cost Variance</div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:8px">Positive = over budget (red), Negative = saving (green)</div>
      ${costs.map(costBar).join('')}
      <div style="font-size:10px;color:var(--muted);margin-top:8px">Expense Utilisation: <span class="${d.exp!=null&&d.exp>1.1?'red':d.exp>1?'yellow':'green'}">${d.exp!=null?Math.round(d.exp*100)+'%':'—'}</span></div>
    </div>

    ${issues.length?`<div class="insight-box"><span class="insight-icon">⚠</span><strong>Alert signals: </strong>${issues.join('；')}。${rootCause?'<br><span style="color:var(--muted)">Analysis note: </span>'+rootCause:''}</div>`:'<div class="insight-box" style="background:rgba(82,196,26,0.06);border-color:rgba(82,196,26,0.2)"><span style="color:var(--green)">✓</span> All major indicators within normal range. No significant alerts.</div>'}
  `;

  setTimeout(()=>{ document.getElementById('detailPanel').scrollIntoView({behavior:'smooth',block:'nearest'}); },100);
}

// ── filter tabs ───────────────────────────────────────────────────────────────
document.querySelectorAll('.ftab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    activeLevel=tab.dataset.level;
    render();
  });
});

// ── main render ───────────────────────────────────────────────────────────────
function render(){
  const data=filtered();
  renderSummary(data);
  renderRegions(data);
  renderHotels(data);
}

populateFilters();
render();
</script>
</body>
</html>
