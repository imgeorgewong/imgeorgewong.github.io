  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

or:#0e6b6b;\">Download CV<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"jw-now\" style=\"display:flex; align-items:center; gap:8px; font-size:12.5px; color:#7a8090;\">\n      <span style=\"width:7px; height:7px; border-radius:50%; background:#0e6b6b; flex-shrink:0;\"><\u002Fspan>\n      Now: MSc dissertation on EU housing affordability · ACCA AA sitting Dec 2026 · available from July 2026\n    <\u002Fdiv>\n  <\u002Fdiv>\n  \n  <sc-if value=\"{{ showPhoto }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"flex-shrink:0;\">\n      <img src=\"ebffe000-c7fb-4e3f-bedd-e5b38428743c\" alt=\"Jingbo Wang\" class=\"jw-photo\" style=\"width:300px; height:360px; border-radius:16px; object-fit:cover; object-position:center 15%; border:1px solid #e2e0db; display:block;\">\n      <div style=\"font-size:11px; color:#7a8090; text-align:center; margin-top:10px; letter-spacing:0.5px;\">Dublin, Ireland<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n<!-- SELECTED WORK -->\n<div id=\"work\" data-screen-label=\"Selected Work\" style=\"background:#ffffff; border-top:1px solid #e2e0db; border-bottom:1px solid #e2e0db;\">\n  <div style=\"max-width:1200px; margin:0 auto; padding:88px 5vw;\">\n    <div style=\"font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:12px; display:flex; align-items:center; gap:10px;\">Selected work <span style=\"width:60px; height:1px; background:#e2e0db;\"><\u002Fspan><\u002Fdiv>\n    <h2 class=\"jw-h2\" style=\"font-family:'DM Serif Display',serif; font-size:clamp(28px,4vw,42px); letter-spacing:-1px; line-height:1.1; margin:0 0 48px; font-weight:400;\">Projects &amp; <em style=\"color:#0e6b6b;\">research.<\u002Fem><\u002Fh2>\n\n    <!-- featured dashboard -->\n    <div class=\"jw-featured\" style=\"display:grid; grid-template-columns:400px 1fr; gap:44px; border:1px solid rgba(14,107,107,0.35); border-radius:14px; padding:36px; align-items:center; background:#f8f7f4;\">\n      <a href=\"hotel_dashboard_en.html\" target=\"_blank\" style=\"text-decoration:none; display:block;\">\n        <div style=\"background:#0d2626; border-radius:12px; padding:22px; display:flex; flex-direction:column; gap:14px;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:12px;\">\n            <div style=\"font-family:'DM Serif Display',serif; font-size:14px; color:#f8f7f4; flex-shrink:0;\">Hotel Operations Alerts<\u002Fdiv>\n            <div style=\"text-align:right;\">\n              <div style=\"font-size:9px; color:#7fb5b5; letter-spacing:1px;\">200+ HOTELS TRACKED<\u002Fdiv>\n              <div style=\"font-size:8px; color:#5a8585; letter-spacing:0.5px; margin-top:2px;\">screened from 543 directly-operated units<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:10px;\">\n            <div style=\"flex:1; background:rgba(255,255,255,0.06); border-radius:6px; padding:12px;\">\n              <div style=\"font-size:8px; letter-spacing:1px; text-transform:uppercase; color:#7fb5b5;\">GOP completion<\u002Fdiv>\n              <div style=\"font-family:'DM Serif Display',serif; font-size:22px; color:#f8f7f4;\">92.4%<\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:5px; font-size:9px; color:#2ab5b5;\"><span style=\"width:6px; height:6px; border-radius:50%; background:#2ab5b5;\"><\u002Fspan>On target<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1; background:rgba(255,255,255,0.06); border-radius:6px; padding:12px;\">\n              <div style=\"font-size:8px; letter-spacing:1px; text-transform:uppercase; color:#7fb5b5;\">Renewal risk<\u002Fdiv>\n              <div style=\"font-family:'DM Serif Display',serif; font-size:22px; color:#f8f7f4;\">17<\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:5px; font-size:9px; color:#e0a570;\"><span style=\"width:6px; height:6px; border-radius:50%; background:#e0a570;\"><\u002Fspan>Amber flags<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:flex-end; gap:6px; height:60px;\">\n            <div style=\"flex:1; height:38%; background:#1a9090; opacity:0.5; border-radius:2px 2px 0 0;\"><\u002Fdiv>\n            <div style=\"flex:1; height:52%; background:#1a9090; opacity:0.6; border-radius:2px 2px 0 0;\"><\u002Fdiv>\n            <div style=\"flex:1; height:47%; background:#1a9090; opacity:0.55; border-radius:2px 2px 0 0;\"><\u002Fdiv>\n            <div style=\"flex:1; height:66%; background:#1a9090; opacity:0.7; border-radius:2px 2px 0 0;\"><\u002Fdiv>\n            <div style=\"flex:1; height:60%; background:#1a9090; opacity:0.68; border-radius:2px 2px 0 0;\"><\u002Fdiv>\n            <div style=\"flex:1; height:85%; background:#2ab5b5; border-radius:2px 2px 0 0;\"><\u002Fdiv>\n            <div style=\"flex:1; height:74%; background:#1a9090; opacity:0.8; border-radius:2px 2px 0 0;\"><\u002Fdiv>\n            <div style=\"flex:1; height:90%; background:#2ab5b5; border-radius:2px 2px 0 0;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:8.5px; color:#5a8585; letter-spacing:0.5px;\">Rolling EBITDA% by region · red/amber/green thresholds<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fa>\n      <div>\n        <div style=\"font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:10px;\">Featured · Interactive dashboard · H World Group<\u002Fdiv>\n        <div class=\"jw-cardtitle\" style=\"font-family:'DM Serif Display',serif; font-size:24px; color:#0d1117; margin-bottom:12px;\">Hotel Operations Alert Dashboard<\u002Fdiv>\n        <div style=\"font-size:14px; color:#3a3f4a; line-height:1.7;\">Three-tier drill-down monitoring across 555 directly-operated hotels tracked 543 operating · 9 temporarily closed by remediation potential. Tracks GOP completion, rolling EBITDA%, RGI index, renewal risk and CAPEX status against red/amber/green thresholds, the monitoring layer behind the group's cost-control programme, including the €2.56M rent-renegotiation initiative. Data anonymised.<\u002Fdiv>\n        <div style=\"display:flex; gap:8px; margin-top:16px; flex-wrap:wrap;\">\n          <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">KPI Monitoring<\u002Fspan>\n          <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">Risk Alerting<\u002Fspan>\n          <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">Power BI Logic<\u002Fspan>\n          <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">JavaScript<\u002Fspan>\n        <\u002Fdiv>\n        <a href=\"hotel_dashboard_en.html\" target=\"_blank\" class=\"jw-dashbtn\" style=\"display:inline-block; margin-top:18px; font-size:13px; color:#0e6b6b; font-weight:600; text-decoration:none;\">Open live dashboard ↗<\u002Fa>\n        <span class=\"jw-mobile-only\" style=\"display:none; font-size:11px; color:#7a8090; text-align:center; margin-top:8px;\">Best viewed on desktop<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- research cards -->\n    <div class=\"jw-workgrid\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px;\">\n\n      <div style=\"border:1px solid #e2e0db; border-radius:14px; padding:30px; background:#ffffff;\">\n        <div style=\"font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:10px;\">Sell-side research · SWS Research<\u002Fdiv>\n        <div class=\"jw-cardtitle\" style=\"font-family:'DM Serif Display',serif; font-size:20px; color:#0d1117; margin-bottom:10px;\">State-Owned Bank Investment Value Analysis<\u002Fdiv>\n        <div class=\"jw-notetext\" style=\"font-size:13px; color:#3a3f4a; line-height:1.65; margin-bottom:14px;\">A 40-page comparative framework across China's six state-owned banks: asset quality cycles, NIM trajectory, expansion capacity, dividend reliability. Agricultural Bank of China as the top pick.<\u002Fdiv>\n        <div style=\"display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px;\">\n          <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">Equity Research<\u002Fspan>\n          <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">DuPont Analysis<\u002Fspan>\n          <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">Wind<\u002Fspan>\n        <\u002Fdiv>\n        <button onclick=\"{{ notes.soe.toggle }}\" aria-expanded=\"{{ notes.soe.open }}\" class=\"jw-notebtn\" style=\"display:inline-flex; align-items:center; gap:6px; font-size:12px; color:#7a8090; background:none; border:1px solid #e2e0db; border-radius:4px; padding:4px 10px; cursor:pointer; font-family:inherit;\" style-hover=\"border-color:#0e6b6b; color:#0e6b6b;\">Research note <span style=\"{{ notes.soe.chevronStyle }}\">▾<\u002Fspan><\u002Fbutton>\n        <div style=\"{{ notes.soe.bodyStyle }}\">\n          <div style=\"overflow:hidden; min-height:0;\">\n            <div style=\"margin-top:16px; padding-top:16px; border-top:1px solid #e2e0db; display:flex; flex-direction:column; gap:12px;\">\n              <div><div style=\"font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:5px;\">Methodology<\u002Fdiv><div class=\"jw-notetext\" style=\"font-size:13px; color:#3a3f4a; line-height:1.65;\">Five-dimensional framework: profitability drivers (ROE decomposition, NIM trajectory), expansion capacity, asset quality cycles, dividend reliability, management quality. Wind data from 2013 to 2024 for all six banks.<\u002Fdiv><\u002Fdiv>\n              <div><div style=\"font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:5px;\">Key findings<\u002Fdiv><div class=\"jw-notetext\" style=\"font-size:13px; color:#3a3f4a; line-height:1.65;\">ABC's NPL ratio fell 108bps from the 2016 peak to 1.08% by mid-2024, the steepest improvement of the six. State-owned banks averaged a 32% dividend payout in 2023 against an explicit 30% regulatory floor, the key differentiator versus joint-stock peers.<\u002Fdiv><\u002Fdiv>\n              <div><div style=\"font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:5px;\">Conclusion<\u002Fdiv><div class=\"jw-notetext\" style=\"font-size:13px; color:#3a3f4a; line-height:1.65;\">ABC top pick: strongest loan growth, most-improved asset quality. ICBC and CCB stable with sufficient infrastructure pipelines to sustain credit growth in an asset-scarce environment.<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border:1px solid #e2e0db; border-radius:14px; padding:30px; background:#ffffff;\">\n        <div style=\"font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:10px;\">Sell-side research · SWS Research<\u002Fdiv>\n        <div class=\"jw-cardtitle\" style=\"font-family:'DM Serif Display',serif; font-size:20px; color:#0d1117; margin-bottom:10px;\">SME Bank Supply-Side Reform: Who Will Survive?<\u002Fdiv>\n        <div class=\"jw-notetext\" style=\"font-size:13px; color:#3a3f4a; line-height:1.65; margin-bottom:14px;\">A 30-page industry report on consolidation in China's regional banking sector, built on a four-dimensional evaluation framework with Changshu Bank and Jinzhou Bank as contrasting case studies.<\u002Fdiv>\n        <div style=\"display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px;\">\n          <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">Industry Research<\u002Fspan>\n          <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">Credit Risk<\u002Fspan>\n          <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">Regulatory Analysis<\u002Fspan>\n        <\u002Fdiv>\n        <button onclick=\"{{ notes.sme.toggle }}\" aria-expanded=\"{{ notes.sme.open }}\" class=\"jw-notebtn\" style=\"display:inline-flex; align-items:center; gap:6px; font-size:12px; color:#7a8090; background:none; border:1px solid #e2e0db; border-radius:4px; padding:4px 10px; cursor:pointer; font-family:inherit;\" style-hover=\"border-color:#0e6b6b; color:#0e6b6b;\">Research note <span style=\"{{ notes.sme.chevronStyle }}\">▾<\u002Fspan><\u002Fbutton>\n        <div style=\"{{ notes.sme.bodyStyle }}\">\n          <div style=\"overflow:hidden; min-height:0;\">\n            <div style=\"margin-top:16px; padding-top:16px; border-top:1px solid #e2e0db; display:flex; flex-direction:column; gap:12px;\">\n              <div><div style=\"font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:5px;\">Methodology<\u002Fdiv><div class=\"jw-notetext\" style=\"font-size:13px; color:#3a3f4a; line-height:1.65;\">Four dimensions (regional environment, asset-side characteristics, liability stability, profitability resilience) applied to two contrasting cases, showing how the same sector dynamics produce divergent outcomes.<\u002Fdiv><\u002Fdiv>\n              <div><div style=\"font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:5px;\">Key findings<\u002Fdiv><div class=\"jw-notetext\" style=\"font-size:13px; color:#3a3f4a; line-height:1.65;\">A decade of micro-enterprise focus let Changshu deliver growth, quality and yield at once: 18.5% loan CAGR against a 13.2% sector average, NPLs below 1%, and a 117bps loan-yield premium. Jinzhou traced the failure path: shadow-banking-driven scale, over-reliance on interbank funding, liquidity crisis, management misconduct.<\u002Fdiv><\u002Fdiv>\n              <div><div style=\"font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:5px;\">Conclusion<\u002Fdiv><div class=\"jw-notetext\" style=\"font-size:13px; color:#3a3f4a; line-height:1.65;\">Consolidation is inevitable; outcomes are not uniform. The differentiator is not size but strategic coherence sustained across credit cycles.<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border:1px solid #e2e0db; border-radius:14px; padding:30px; background:#ffffff;\">\n        <div style=\"font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:10px;\">Credit analysis · SWS Research<\u002Fdiv>\n        <div class=\"jw-cardtitle\" style=\"font-family:'DM Serif Display',serif; font-size:20px; color:#0d1117; margin-bottom:10px;\">Qingdao Rural Commercial Bank: Asset Quality Diagnostic<\u002Fdiv>\n        <div class=\"jw-notetext\" style=\"font-size:13px; color:#3a3f4a; line-height:1.65; margin-bottom:14px;\">A standalone credit assessment: full ROE decomposition isolating credit cost as the primary drag, granular NPL analysis by loan category, and forward-looking risk indicators.<\u002Fdiv>\n        <div style=\"display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px;\">\n          <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">Credit Analysis<\u002Fspan>\n          <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">ROE Decomposition<\u002Fspan>\n          <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">NPL Analysis<\u002Fspan>\n        <\u002Fdiv>\n        <button onclick=\"{{ notes.qrcb.toggle }}\" aria-expanded=\"{{ notes.qrcb.open }}\" class=\"jw-notebtn\" style=\"display:inline-flex; align-items:center; gap:6px; font-size:12px; color:#7a8090; background:none; border:1px solid #e2e0db; border-radius:4px; padding:4px 10px; cursor:pointer; font-family:inherit;\" style-hover=\"border-color:#0e6b6b; color:#0e6b6b;\">Research note <span style=\"{{ notes.qrcb.chevronStyle }}\">▾<\u002Fspan><\u002Fbutton>\n        <div style=\"{{ notes.qrcb.bodyStyle }}\">\n          <div style=\"overflow:hidden; min-height:0;\">\n            <div style=\"margin-top:16px; padding-top:16px; border-top:1px solid #e2e0db; display:flex; flex-direction:column; gap:12px;\">\n              <div><div style=\"font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:5px;\">Key findings<\u002Fdiv><div class=\"jw-notetext\" style=\"font-size:13px; color:#3a3f4a; line-height:1.65;\">Credit cost of 1.04% in 2023, 60bps above the rural commercial bank average, suppressed ROAA to 0.57%. NPLs concentrated in legacy corporate exposure: manufacturing 6.86%, wholesale and retail 3.08%. A special-mention ratio of 5.79% and a 2.03% annualised NPL formation rate signalled unrecognised at-risk stock.<\u002Fdiv><\u002Fdiv>\n              <div><div style=\"font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:5px;\">Conclusion<\u002Fdiv><div class=\"jw-notetext\" style=\"font-size:13px; color:#3a3f4a; line-height:1.65;\">Regional economic stress and weak governance compound each other. Even as legacy NPLs stabilise, rising SME operating-loan risk and internal control issues rule out a near-term re-rating.<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ showEsgCard }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"border:1px solid #e2e0db; border-radius:14px; padding:30px; background:#ffffff;\">\n          <div style=\"font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:10px;\">MSc coursework · Trinity College Dublin<\u002Fdiv>\n          <div class=\"jw-cardtitle\" style=\"font-family:'DM Serif Display',serif; font-size:20px; color:#0d1117; margin-bottom:10px;\">Greenwashing vs Greenhushing: NLP Analysis of 857 Sustainability Reports<\u002Fdiv>\n          <div class=\"jw-notetext\" style=\"font-size:13px; color:#3a3f4a; line-height:1.65; margin-bottom:14px;\">A dual-signal NLP framework across 857 S&amp;P 500 sustainability reports (2014 to 2023): LDA topic modelling to detect environmental greenhushing, vocabulary-density indicators to detect greenwashing.<\u002Fdiv>\n          <div style=\"display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px;\">\n            <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">NLP / LDA<\u002Fspan>\n            <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">ESG Analytics<\u002Fspan>\n            <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">Python<\u002Fspan>\n          <\u002Fdiv>\n          <button onclick=\"{{ notes.esg.toggle }}\" aria-expanded=\"{{ notes.esg.open }}\" class=\"jw-notebtn\" style=\"display:inline-flex; align-items:center; gap:6px; font-size:12px; color:#7a8090; background:none; border:1px solid #e2e0db; border-radius:4px; padding:4px 10px; cursor:pointer; font-family:inherit;\" style-hover=\"border-color:#0e6b6b; color:#0e6b6b;\">Research note <span style=\"{{ notes.esg.chevronStyle }}\">▾<\u002Fspan><\u002Fbutton>\n          <div style=\"{{ notes.esg.bodyStyle }}\">\n            <div style=\"overflow:hidden; min-height:0;\">\n              <div style=\"margin-top:16px; padding-top:16px; border-top:1px solid #e2e0db; display:flex; flex-direction:column; gap:12px;\">\n                <div><div style=\"font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:5px;\">Methodology<\u002Fdiv><div class=\"jw-notetext\" style=\"font-size:13px; color:#3a3f4a; line-height:1.65;\">857 reports from 263 S&amp;P 500 companies, preprocessed through a stemming pipeline. A 12-topic LDA model measured each report's environmental topic share, validated at r = 0.58 against an independent environmental score. Greenhushing flagged by a triple criterion: top-quartile ESG score, bottom-quartile disclosure intensity, bottom-quartile environmental topic share. Greenwashing flagged by vocabulary density: top-quartile aspirational language paired with bottom-quartile technical specificity.<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:5px;\">Key findings<\u002Fdiv><div class=\"jw-notetext\" style=\"font-size:13px; color:#3a3f4a; line-height:1.65;\">67 greenwashing cases (7.8%) and 8 environmental greenhushing cases (0.9%), with only 2 overlapping, 27 times below the level expected under independence. Greenwashing fell from 22.9% in 2018 to 2.6% in 2022 (Spearman ρ = −0.829, p = 0.042); greenhushing showed no equivalent decline. Consumer Defensive firms were 5.36 times over-represented among greenhushers.<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:5px;\">Conclusion<\u002Fdiv><div class=\"jw-notetext\" style=\"font-size:13px; color:#3a3f4a; line-height:1.65;\">The two risks are structurally distinct disclosure behaviours. A screen tuned to catch overclaiming systematically misses the silent husher, so text-level analysis is a necessary complement to score-based ESG assessment.<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"border:1px solid #e2e0db; border-radius:14px; padding:30px; background:#ffffff;\">\n        <div style=\"font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:10px;\">MSc dissertation · In progress<\u002Fdiv>\n        <div class=\"jw-cardtitle\" style=\"font-family:'DM Serif Display',serif; font-size:20px; color:#0d1117; margin-bottom:10px;\">Housing Affordability &amp; Spatial Equilibrium<\u002Fdiv>\n        <div class=\"jw-notetext\" style=\"font-size:13px; color:#3a3f4a; line-height:1.65; margin-bottom:14px;\">A spatial equilibrium model of housing affordability across NUTS-2 regions in Italy and Spain, covering labour mobility, amenity valuation and supply-side constraints.<\u002Fdiv>\n        <div style=\"display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px;\">\n          <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">Spatial Econometrics<\u002Fspan>\n          <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">R<\u002Fspan>\n          <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">EU Data<\u002Fspan>\n        <\u002Fdiv>\n        <button onclick=\"{{ notes.diss.toggle }}\" aria-expanded=\"{{ notes.diss.open }}\" class=\"jw-notebtn\" style=\"display:inline-flex; align-items:center; gap:6px; font-size:12px; color:#7a8090; background:none; border:1px solid #e2e0db; border-radius:4px; padding:4px 10px; cursor:pointer; font-family:inherit;\" style-hover=\"border-color:#0e6b6b; color:#0e6b6b;\">Research note <span style=\"{{ notes.diss.chevronStyle }}\">▾<\u002Fspan><\u002Fbutton>\n        <div style=\"{{ notes.diss.bodyStyle }}\">\n          <div style=\"overflow:hidden; min-height:0;\">\n            <div style=\"margin-top:16px; padding-top:16px; border-top:1px solid #e2e0db; display:flex; flex-direction:column; gap:12px;\">\n              <div><div style=\"font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:5px;\">Methodology<\u002Fdiv><div class=\"jw-notetext\" style=\"font-size:13px; color:#3a3f4a; line-height:1.65;\">Spatial equilibrium framework linking wages, rents and amenity values across 40 NUTS-2 regions in Italy and Spain, estimated with panel regression on Eurostat regional data. Supply-side constraints (planning, construction-cost indices) modelled as regional frictions.<\u002Fdiv><\u002Fdiv>\n              <div><div style=\"font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:5px;\">Status<\u002Fdiv><div class=\"jw-notetext\" style=\"font-size:13px; color:#3a3f4a; line-height:1.65;\">In progress, submission September 2026. Research question: which margin, labour mobility or housing supply elasticity, does more to explain the affordability gap between Southern European metros and their hinterlands.<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border:1px solid #e2e0db; border-radius:14px; padding:30px; background:#ffffff;\">\n        <div style=\"font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:10px;\">Undergraduate thesis · Quantitative research<\u002Fdiv>\n        <div class=\"jw-cardtitle\" style=\"font-family:'DM Serif Display',serif; font-size:20px; color:#0d1117; margin-bottom:10px;\">Carbon Trading Policy Impact: A DiD Analysis<\u002Fdiv>\n        <div class=\"jw-notetext\" style=\"font-size:13px; color:#3a3f4a; line-height:1.65;\">The causal effect of China's carbon trading pilot policies on urban green finance development, estimated with difference-in-differences on city-level panel data, 2000 to 2019.<\u002Fdiv>\n        <div style=\"display:flex; gap:6px; flex-wrap:wrap; margin-top:14px;\">\n          <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">Difference-in-Differences<\u002Fspan>\n          <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">Panel Data<\u002Fspan>\n          <span style=\"font-size:11px; color:#7a8090; border:1px solid #e2e0db; border-radius:4px; padding:2px 8px;\">Stata<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- EXPERIENCE -->\n<div id=\"experience\" data-screen-label=\"Experience\" style=\"max-width:1200px; margin:0 auto; padding:88px 5vw;\">\n  <div style=\"font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:12px; display:flex; align-items:center; gap:10px;\">Career <span style=\"width:60px; height:1px; background:#e2e0db;\"><\u002Fspan><\u002Fdiv>\n  <h2 class=\"jw-h2\" style=\"font-family:'DM Serif Display',serif; font-size:clamp(28px,4vw,42px); letter-spacing:-1px; line-height:1.1; margin:0 0 48px; font-weight:400;\">Work <em style=\"color:#0e6b6b;\">experience.<\u002Fem><\u002Fh2>\n\n  <sc-for list=\"{{ roles }}\" as=\"role\" hint-placeholder-count=\"4\">\n    <div class=\"jw-exp\" style=\"display:grid; grid-template-columns:180px 1fr; gap:40px; padding:40px 0; border-top:1px solid #e2e0db;\">\n      <div>\n        <div style=\"font-size:12px; color:#7a8090; margin-bottom:6px;\">{{ role.date }}<\u002Fdiv>\n        <div style=\"font-size:13px; font-weight:600; color:#0d1117; margin-bottom:4px;\">{{ role.company }}<\u002Fdiv>\n        <div style=\"font-size:12px; color:#7a8090;\">{{ role.location }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:17px; font- \n      if (vis !== this.state.barVisible) this.setState({ barVisible: vis });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n  }\n\n  componentWillUnmount() {\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n  }\n\n  note(key) {\n    const open = !!this.state.open[key];\n    return {\n      open,\n      toggle: () => {\n        const next = { ...this.state.open, [key]: !open };\n        this.setState({ open: next });\n        try { sessionStorage.setItem('jw_notes_open', JSON.stringify(next)); } catch (e) {}\n      },\n      chevronStyle: {\n        display: 'inline-block',\n        transition: 'transform 240ms ease-out',\n        transform: open ? 'rotate(180deg)' : 'rotate(0deg)',\n        fontSize: '10px'\n      },\n      bodyStyle: {\n        display: 'grid',\n        gridTemplateRows: open ? '1fr' : '0fr',\n        transition: 'grid-template-rows 240ms ease-out'\n      }\n    };\n  }\n\n  renderVals() {\n    const barOn = this.state.barVisible && !this.state.barDismissed;\n    return {\n      showVisa: this.props.showVisa ?? true,\n      showPhoto: this.props.showPhoto ?? true,\n      showEsgCard: this.props.showEsgCard ?? true,\n      notes: {\n        soe: this.note('soe'),\n        sme: this.note('sme'),\n        qrcb: this.note('qrcb'),\n        esg: this.note('esg'),\n        diss: this.note('diss')\n      },\n      stickyBarStyle: {\n        position: 'fixed', left: 0, right: 0, bottom: 0, zIndex: 200,\n        height: '56px', background: '#f8f7f4', borderTop: '1px solid #e2e0db',\n        alignItems: 'center', padding: '0 16px', boxSizing: 'border-box',\n        display: 'none',\n        transform: barOn ? 'translateY(0)' : 'translateY(110%)',\n        transition: 'transform 200ms ease-out'\n      },\n      dismissBar: () => {\n        this.setState({ barDismissed: true });\n        try { sessionStorage.setItem('jw_bar_dismissed', '1'); } catch (e) {}\n      },\n      roles: [\n
