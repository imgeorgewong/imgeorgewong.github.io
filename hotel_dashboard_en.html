document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"5f32c82e-3601-44c3-b887-b1d4dbb5c877\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<meta charset=\"utf-8\">\n<title>Hotel Portfolio Alert Dashboard<\u002Ftitle>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<style>/* latin-ext */\n@font-face {\n  font-family: 'DM Serif Display';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"0fbbfff0-dde7-45aa-8628-dfa0e8be550d\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Serif Display';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"b5a1a444-87f0-43b4-86f4-9ccc6b87f3e4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  html, body { margin:0; padding:0; background:#f4f3f0; }\n  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; color:#0d1117; -webkit-font-smoothing:antialiased; }\n  * { box-sizing: border-box; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div data-screen-label=\"Dashboard\" style=\"min-height:100vh; background:#f4f3f0;\">\n  <div style=\"max-width:1360px; margin:0 auto; padding:28px 24px 60px;\">\n\n    <!-- HEADER -->\n    <div style=\"display:flex; flex-wrap:wrap; gap:16px; align-items:flex-end; justify-content:space-between; border-bottom:1px solid #dcdad4; padding-bottom:18px; margin-bottom:22px;\">\n      <div>\n        <div style=\"font-family:'DM Serif Display',serif; font-size:28px; line-height:1.2; color:#0d1117;\">Direct-Operated Portfolio · Alert Dashboard<\u002Fdiv>\n        <div style=\"font-size:13px; color:#7a8090; margin-top:6px;\">Traffic-light early-warning across {{ kpi.total }} direct-operated hotels · Jan–Feb 2025 rolling data<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:8px; align-items:center;\">\n        <span style=\"font-size:11px; color:#7a8090; border:1px solid #dcdad4; border-radius:4px; padding:4px 10px; background:#fbfaf8;\">Anonymised demo — identifiers replaced, values rescaled<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- KPI BAND -->\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(170px, 1fr)); gap:12px; margin-bottom:22px;\">\n      <div style=\"background:#ffffff; border:1px solid #e2e0db; border-radius:12px; padding:16px 18px;\">\n        <div style=\"font-size:10px; letter-spacing:1.2px; text-transform:uppercase; color:#7a8090; font-weight:600;\">Properties<\u002Fdiv>\n        <div style=\"font-size:28px; font-weight:600; margin-top:6px;\">{{ kpi.total }}<\u002Fdiv>\n        <div style=\"font-size:11px; color:#7a8090; margin-top:4px;\">{{ kpi.suspended }} temporarily closed<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#ffffff; border:1px solid #e2e0db; border-radius:12px; padding:16px 18px;\">\n        <div style=\"font-size:10px; letter-spacing:1.2px; text-transform:uppercase; color:#7a8090; font-weight:600;\">GOP alert split<\u002Fdiv>\n        <div style=\"display:flex; gap:12px; margin-top:8px; align-items:baseline;\">\n          <div style=\"display:flex; gap:5px; align-items:baseline;\"><span style=\"width:9px; height:9px; border-radius:50%; background:#b54334; display:inline-block;\"><\u002Fspan><span style=\"font-size:22px; font-weight:600; color:#b54334;\">{{ kpi.r }}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:5px; align-items:baseline;\"><span style=\"width:9px; height:9px; border-radius:50%; background:#b07d10; display:inline-block;\"><\u002Fspan><span style=\"font-size:22px; font-weight:600; color:#b07d10;\">{{ kpi.y }}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:5px; align-items:baseline;\"><span style=\"width:9px; height:9px; border-radius:50%; background:#226e4e; display:inline-block;\"><\u002Fspan><span style=\"font-size:22px; font-weight:600; color:#226e4e;\">{{ kpi.g }}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; height:5px; border-radius:3px; overflow:hidden; margin-top:10px; background:#eeece7;\">\n          <div style=\"{{ kpi.rBar }}\"><\u002Fdiv><div style=\"{{ kpi.yBar }}\"><\u002Fdiv><div style=\"{{ kpi.gBar }}\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#ffffff; border:1px solid #e2e0db; border-radius:12px; padding:16px 18px;\">\n        <div style=\"font-size:10px; letter-spacing:1.2px; text-transform:uppercase; color:#7a8090; font-weight:600;\">GOP achievement<\u002Fdiv>\n        <div style=\"font-size:28px; font-weight:600; margin-top:6px; color:{{ kpi.gopColor }};\">{{ kpi.gopAch }}<\u002Fdiv>\n        <div style=\"font-size:11px; color:#7a8090; margin-top:4px;\">actual vs budget, portfolio<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#ffffff; border:1px solid #e2e0db; border-radius:12px; padding:16px 18px;\">\n        <div style=\"font-size:10px; letter-spacing:1.2px; text-transform:uppercase; color:#7a8090; font-weight:600;\">Revenue achievement<\u002Fdiv>\n        <div style=\"font-size:28px; font-weight:600; margin-top:6px;\">{{ kpi.revAch }}<\u002Fdiv>\n        <div style=\"font-size:11px; color:#7a8090; margin-top:4px;\">cost usage {{ kpi.costUse }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#ffffff; border:1px solid #e2e0db; border-radius:12px; padding:16px 18px;\">\n        <div style=\"font-size:10px; letter-spacing:1.2px; text-transform:uppercase; color:#7a8090; font-weight:600;\">Occupancy<\u002Fdiv>\n        <div style=\"font-size:28px; font-weight:600; margin-top:6px;\">{{ kpi.occ }}<\u002Fdiv>\n        <div style=\"font-size:11px; color:#7a8090; margin-top:4px;\">vs {{ kpi.occBudget }} budget<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#ffffff; border:1px solid #e2e0db; border-radius:12px; padding:16px 18px;\">\n        <div style=\"font-size:10px; letter-spacing:1.2px; text-transform:uppercase; color:#7a8090; font-weight:600;\">RGI ≥ 0.95<\u002Fdiv>\n        <div style=\"font-size:28px; font-weight:600; margin-top:6px;\">{{ kpi.rgiShare }}<\u002Fdiv>\n        <div style=\"font-size:11px; color:#7a8090; margin-top:4px;\">of rated properties, Feb<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- DIMENSION COMPARISON -->\n    <div data-screen-label=\"Region comparison\" style=\"background:#ffffff; border:1px solid #e2e0db; border-radius:12px; padding:20px 22px; margin-bottom:22px;\">\n      <div style=\"display:flex; flex-wrap:wrap; gap:12px; align-items:center; justify-content:space-between; margin-bottom:16px;\">\n        <div style=\"font-size:15px; font-weight:600;\">Alert distribution &amp; GOP achievement<\u002Fdiv>\n        <div style=\"display:flex; gap:6px;\">\n          <sc-for list=\"{{ dimPills }}\" as=\"p\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ p.onClick }}\" style=\"{{ p.style }}\" style-hover=\"border-color:#0e6b6b; color:#0e6b6b;\">{{ p.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:10px;\">\n        <sc-for list=\"{{ dimRows }}\" as=\"d\" hint-placeholder-count=\"6\">\n          <div style=\"display:grid; grid-template-columns:150px 1fr 120px 90px; gap:14px; align-items:center;\">\n            <div style=\"font-size:13px; color:#3a3f4a; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ d.name }}<\u002Fdiv>\n            <div style=\"display:flex; height:20px; border-radius:5px; overflow:hidden; background:#f1efe9;\" title=\"{{ d.tip }}\">\n              <div style=\"{{ d.rBar }}\"><\u002Fdiv><div style=\"{{ d.yBar }}\"><\u002Fdiv><div style=\"{{ d.gBar }}\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:12px; color:#7a8090; text-align:right; font-variant-numeric:tabular-nums;\">{{ d.counts }}<\u002Fdiv>\n            <div style=\"font-size:13px; font-weight:600; text-align:right; font-variant-numeric:tabular-nums; color:{{ d.gopColor }};\">{{ d.gop }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"display:grid; grid-template-columns:150px 1fr 120px 90px; gap:14px; font-size:10px; color:#a8adb8; text-transform:uppercase; letter-spacing:1px;\">\n          <div><\u002Fdiv><div>red / yellow / green share of properties<\u002Fdiv><div style=\"text-align:right;\">R · Y · G<\u002Fdiv><div style=\"text-align:right;\">GOP ach.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- STORE TABLE -->\n    <div data-screen-label=\"Store health table\" style=\"background:#ffffff; border:1px solid #e2e0db; border-radius:12px; padding:20px 22px; margin-bottom:22px;\">\n      <div style=\"display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between; margin-bottom:6px;\">\n        <div>\n          <div style=\"font-size:15px; font-weight:600;\">Property health screen<\u002Fdiv>\n          <div style=\"font-size:12px; color:#7a8090; margin-top:3px;\">Five primary indicators per property — click a row to trace the root cause<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-wrap:wrap; gap:6px; align-items:center;\">\n          <sc-for list=\"{{ alertPills }}\" as=\"p\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ p.onClick }}\" style=\"{{ p.style }}\" style-hover=\"border-color:#0e6b6b; color:#0e6b6b;\">{{ p.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:6px; margin:10px 0 14px;\">\n        <sc-for list=\"{{ regionPills }}\" as=\"p\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ p.onClick }}\" style=\"{{ p.style }}\" style-hover=\"border-color:#0e6b6b; color:#0e6b6b;\">{{ p.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n        <span style=\"width:1px; background:#e2e0db; margin:2px 4px;\"><\u002Fspan>\n        <sc-for list=\"{{ segPills }}\" as=\"p\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ p.onClick }}\" style=\"{{ p.style }}\" style-hover=\"border-color:#0e6b6b; color:#0e6b6b;\">{{ p.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"overflow-x:auto;\">\n        <div style=\"min-width:900px;\">\n          <div style=\"display:grid; grid-template-columns:86px 1.3fr 64px 1.5fr 84px 64px 150px 70px; gap:12px; padding:8px 10px; font-size:10px; color:#a8adb8; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid #e2e0db;\">\n            <div>ID<\u002Fdiv><div>Segment · Region<\u002Fdiv><div>Rooms<\u002Fdiv><div>GOP achievement<\u002Fdiv><div>EBITDA %<\u002Fdiv><div>RGI<\u002Fdiv><div>Indicator lights<\u002Fdiv><div style=\"text-align:right;\">Alerts<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ visible }}\" as=\"s\" hint-placeholder-count=\"8\">\n            <div onclick=\"{{ s.select }}\" style=\"display:grid; grid-template-columns:86px 1.3fr 64px 1.5fr 84px 64px 150px 70px; gap:12px; padding:10px; align-items:center; border-bottom:1px solid #f1efe9; cursor:pointer; border-radius:6px;\" style-hover=\"background:#f8f7f4;\">\n              <div style=\"font-size:12px; font-weight:600; color:#0e6b6b; font-variant-numeric:tabular-nums;\">{{ s.id }}<\u002Fdiv>\n              <div style=\"font-size:12px; color:#3a3f4a; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ s.label }}<\u002Fdiv>\n              <div style=\"font-size:12px; color:#7a8090; font-variant-numeric:tabular-nums;\">{{ s.rooms }}<\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:8px;\">\n                <div style=\"flex:1; height:6px; border-radius:3px; background:#f1efe9; overflow:hidden;\"><div style=\"{{ s.gopBar }}\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"font-size:12px; font-weight:600; width:48px; text-align:right; font-variant-numeric:tabular-nums; color:{{ s.gopColor }};\">{{ s.gop }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:12px; font-variant-numeric:tabular-nums; color:{{ s.ebColor }};\">{{ s.eb }}<\u002Fdiv>\n              <div style=\"font-size:12px; font-variant-numeric:tabular-nums; color:{{ s.rgiColor }};\">{{ s.rgi }}<\u002Fdiv>\n              <div style=\"display:flex; gap:6px; align-items:center;\">\n                <sc-for list=\"{{ s.dots }}\" as=\"d\" hint-placeholder-count=\"5\">\n                  <span title=\"{{ d.tip }}\" style=\"{{ d.style }}\"><\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"text-align:right;\"><span style=\"{{ s.redBadge }}\">{{ s.reds }}<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:14px; align-items:center; margin-top:14px;\">\n        <button onclick=\"{{ showMore }}\" style=\"font-size:12px; color:#0e6b6b; background:none; border:1px solid #dcdad4; border-radius:6px; padding:7px 16px; cursor:pointer; font-family:inherit;\" style-hover=\"border-color:#0e6b6b;\">Show more<\u002Fbutton>\n        <span style=\"font-size:12px; color:#7a8090;\">Showing {{ shownCount }} of {{ filteredCount }} · sorted by alert count, then GOP achievement<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- RENEWAL + CAPEX -->\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(340px, 1fr)); gap:22px; margin-bottom:22px;\">\n      <div data-screen-label=\"Renewal risk\" style=\"background:#ffffff; border:1px solid #e2e0db; border-radius:12px; padding:20px 22px;\">\n        <div style=\"display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between; margin-bottom:14px;\">\n          <div style=\"font-size:15px; font-weight:600;\">Lease renewal risk<\u002Fdiv>\n          <div style=\"display:flex; gap:6px;\">\n            <sc-for list=\"{{ renewPills }}\" as=\"p\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ p.onClick }}\" style=\"{{ p.style }}\" style-hover=\"border-color:#0e6b6b; color:#0e6b6b;\">{{ p.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:8px; max-height:420px; overflow-y:auto;\">\n          <sc-for list=\"{{ renewRows }}\" as=\"r\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex; gap:12px; align-items:center; border:1px solid #f1efe9; border-radius:8px; padding:10px 12px;\">\n              <span style=\"{{ r.badge }}\">{{ r.risk }}<\u002Fspan>\n              <div style=\"flex:1; min-width:0;\">\n                <div style=\"font-size:12px; font-weight:600; color:#3a3f4a;\">{{ r.id }} · {{ r.region }} <span style=\"font-weight:400; color:#a8adb8;\">· {{ r.owner }}<\u002Fspan><\u002Fdiv>\n                <div style=\"font-size:11px; color:#7a8090; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ r.sub }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"text-align:right;\">\n                <div style=\"font-size:14px; font-weight:600; font-variant-numeric:tabular-nums; color:{{ r.daysColor }};\">{{ r.days }}<\u002Fdiv>\n                <div style=\"font-size:10px; color:#a8adb8;\">days left<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-screen-label=\"CAPEX projects\" style=\"background:#ffffff; border:1px solid #e2e0db; border-radius:12px; padding:20px 22px;\">\n        <div style=\"display:flex; gap:10px; align-items:baseline; justify-content:space-between; margin-bottom:14px;\">\n          <div style=\"font-size:15px; font-weight:600;\">CAPEX project tracker<\u002Fdiv>\n          <div style=\"font-size:12px; color:#7a8090;\">{{ capexSummary }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:8px; max-height:420px; overflow-y:auto;\">\n          <sc-for list=\"{{ capexRows }}\" as=\"c\" hint-placeholder-count=\"5\">\n            <div style=\"border:1px solid #f1efe9; border-radius:8px; padding:10px 12px;\">\n              <div style=\"display:flex; gap:10px; align-items:center; justify-content:space-between;\">\n                <div style=\"font-size:12px; font-weight:600; color:#3a3f4a;\">{{ c.id }} <span style=\"font-weight:400; color:#a8adb8;\">· {{ c.stage }}<\u002Fspan><\u002Fdiv>\n                <span style=\"{{ c.badge }}\">{{ c.health }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:10px; margin-top:8px;\">\n                <div style=\"flex:1; height:6px; border-radius:3px; background:#f1efe9; overflow:hidden;\"><div style=\"{{ c.bar }}\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"font-size:11px; color:#7a8090; width:34px; text-align:right; font-variant-numeric:tabular-nums;\">{{ c.progress }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- METHODOLOGY -->\n    <div data-screen-label=\"Methodology\" style=\"background:#ffffff; border:1px solid #e2e0db; border-radius:12px; padding:20px 22px;\">\n      <button onclick=\"{{ toggleMethod }}\" style=\"display:flex; align-items:center; gap:8px; font-size:15px; font-weight:600; color:#0d1117; background:none; border:none; padding:0; cursor:pointer; font-family:inherit;\">Alert methodology <span style=\"{{ methodChevron }}\">▾<\u002Fspan><\u002Fbutton>\n      <sc-if value=\"{{ methodOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:18px; margin-top:16px;\">\n          <div>\n            <div style=\"font-size:11px; letter-spacing:1.2px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:6px;\">GOP achievement<\u002Fdiv>\n            <div style=\"font-size:13px; color:#3a3f4a; line-height:1.6;\">Red below {{ thrRed }}%, yellow {{ thrRed }}–{{ thrGreen }}%, green above {{ thrGreen }}%. Boundaries set at the average of the bottom-20% and bottom-50% percentile achievement over 2023–24, so the bands reflect the portfolio's own distribution rather than an arbitrary target.<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:11px; letter-spacing:1.2px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:6px;\">Rolling-12m EBITDA %<\u002Fdiv>\n            <div style=\"font-size:13px; color:#3a3f4a; line-height:1.6;\">Red below 0%, yellow 0–5%, green above 5%. Rolling twelve months smooths seasonality in depreciation-heavy figures. The 5% bar reflects four management fees now charged to direct stores for comparability with franchisees (membership sales commission, central-booking fee, loyalty-point settlement, HQ management fee).<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:11px; letter-spacing:1.2px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:6px;\">RGI — revenue generation index<\u002Fdiv>\n            <div style=\"font-size:13px; color:#3a3f4a; line-height:1.6;\">RevPAR vs the internal competitive set. Red below 0.80, yellow 0.80–0.95, green above 0.95. The par is set below 1.0 because legacy direct-operated stores compete against a much newer comp set.<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:11px; letter-spacing:1.2px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:6px;\">Renewal &amp; CAPEX<\u002Fdiv>\n            <div style=\"font-size:13px; color:#3a3f4a; line-height:1.6;\">Renewal risk graded from owner-communication progress: owner unwilling to renew — red; hesitant, pricing under negotiation — yellow; committed on current terms — green. CAPEX flags projects delayed or paused against plan.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"grid-column:1 / -1; border-top:1px solid #f1efe9; padding-top:14px;\">\n            <div style=\"font-size:11px; letter-spacing:1.2px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:6px;\">Escalation loop<\u002Fdiv>\n            <div style=\"font-size:13px; color:#3a3f4a; line-height:1.6;\">Properties with 3+ red lights trigger an operating review with the store GM and regional manager. The miss is decomposed level by level: GOP gap → revenue shortfall vs cost overrun → occupancy vs rate (RevPAR, ADR) on the revenue side, labour / energy / rooms / sales-fee lines on the cost side — the same trace shown in this dashboard's drill-down panel.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <div style=\"font-size:11px; color:#a8adb8; margin-top:18px; line-height:1.6;\">Portfolio demonstration by Jingbo Wang. All property identifiers, brands and counterparties anonymised; monetary values rescaled. Underlying methodology: percentile-based traffic-light alerting on GOP achievement, rolling EBITDA%, RGI, lease renewal and CAPEX status.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- DRILL-DOWN PANEL -->\n  <sc-if value=\"{{ hasSel }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Store drill-down\" style=\"position:fixed; inset:0; z-index:50;\">\n      <div onclick=\"{{ closeSel }}\" style=\"position:absolute; inset:0; background:rgba(13,17,23,0.35);\"><\u002Fdiv>\n      <div style=\"position:absolute; top:0; right:0; bottom:0; width:min(480px, 100vw); background:#fbfaf8; border-left:1px solid #e2e0db; box-shadow:-12px 0 40px rgba(13,17,23,0.12); overflow-y:auto; padding:26px 26px 40px;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px;\">\n          <div>\n            <div style=\"font-family:'DM Serif Display',serif; font-size:24px;\">{{ sel.id }}<\u002Fdiv>\n            <div style=\"font-size:12px; color:#7a8090; margin-top:4px;\">{{ sel.label }} · {{ sel.rooms }} rooms · opened {{ sel.open }}<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ closeSel }}\" aria-label=\"Close\" style=\"background:none; border:1px solid #dcdad4; border-radius:6px; color:#7a8090; font-size:14px; cursor:pointer; padding:4px 10px;\" style-hover=\"border-color:#0e6b6b; color:#0e6b6b;\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ sel.suspended }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:inline-block; font-size:11px; color:#b54334; border:1px solid #ecd2cd; background:#f9e9e6; border-radius:4px; padding:2px 8px; margin-top:6px;\">Temporarily closed<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"display:flex; gap:8px; margin:16px 0 20px; flex-wrap:wrap;\">\n          <sc-for list=\"{{ sel.chips }}\" as=\"c\" hint-placeholder-count=\"5\">\n            <div style=\"{{ c.style }}\" title=\"{{ c.tip }}\">\n              <span style=\"{{ c.dot }}\"><\u002Fspan>\n              <span>{{ c.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"font-size:11px; letter-spacing:1.2px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:8px;\">Root-cause trace<\u002Fdiv>\n        <div style=\"background:#ffffff; border:1px solid #e2e0db; border-radius:10px; padding:16px;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:baseline;\">\n            <div style=\"font-size:13px; font-weight:600;\">GOP vs budget<\u002Fdiv>\n            <div style=\"font-size:15px; font-weight:600; font-variant-numeric:tabular-nums; color:{{ sel.gopGapColor }};\">{{ sel.gopGap }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:12px; color:#7a8090; margin-top:2px;\">{{ sel.gopLine }}<\u002Fdiv>\n\n          <div style=\"border-left:2px solid #e2e0db; margin:14px 0 0 6px; padding-left:16px; display:flex; flex-direction:column; gap:14px;\">\n            <div>\n              <div style=\"display:flex; justify-content:space-between; align-items:baseline;\">\n                <div style=\"font-size:12px; font-weight:600; color:#3a3f4a;\">Revenue side<\u002Fdiv>\n                <div style=\"font-size:13px; font-weight:600; font-variant-numeric:tabular-nums; color:{{ sel.revGapColor }};\">{{ sel.revGap }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:8px;\">\n                <div style=\"background:#f8f7f4; border-radius:6px; padding:8px 10px;\"><div style=\"font-size:10px; color:#a8adb8; text-transform:uppercase; letter-spacing:0.8px;\">Occupancy<\u002Fdiv><div style=\"font-size:13px; font-weight:600; margin-top:3px; font-variant-numeric:tabular-nums;\">{{ sel.occ }}<\u002Fdiv><div style=\"font-size:10px; color:#7a8090;\">{{ sel.occVs }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#f8f7f4; border-radius:6px; padding:8px 10px;\"><div style=\"font-size:10px; color:#a8adb8; text-transform:uppercase; letter-spacing:0.8px;\">RevPAR<\u002Fdiv><div style=\"font-size:13px; font-weight:600; margin-top:3px; font-variant-numeric:tabular-nums;\">{{ sel.rp }}<\u002Fdiv><div style=\"font-size:10px; color:#7a8090;\">{{ sel.rpVs }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#f8f7f4; border-radius:6px; padding:8px 10px;\"><div style=\"font-size:10px; color:#a8adb8; text-transform:uppercase; letter-spacing:0.8px;\">ADR<\u002Fdiv><div style=\"font-size:13px; font-weight:600; margin-top:3px; font-variant-numeric:tabular-nums;\">{{ sel.adr }}<\u002Fdiv><div style=\"font-size:10px; color:#7a8090;\">{{ sel.rgiLine }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"display:flex; justify-content:space-between; align-items:baseline;\">\n                <div style=\"font-size:12px; font-weight:600; color:#3a3f4a;\">Cost side<\u002Fdiv>\n                <div style=\"font-size:13px; font-weight:600; font-variant-numeric:tabular-nums; color:{{ sel.costGapColor }};\">{{ sel.costGap }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:12px; color:#7a8090; margin-top:4px;\">{{ sel.costLine }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#eef4f2; border:1px solid #d6e4e0; border-radius:10px; padding:14px 16px; margin-top:14px;\">\n          <div style=\"font-size:11px; letter-spacing:1.2px; text-transform:uppercase; color:#0e6b6b; font-weight:600; margin-bottom:5px;\">Read<\u002Fdiv>\n          <div style=\"font-size:13px; color:#3a3f4a; line-height:1.6;\">{{ sel.verdict }}<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px;\">\n          <div style=\"background:#ffffff; border:1px solid #e2e0db; border-radius:10px; padding:12px 14px;\">\n            <div style=\"font-size:10px; color:#a8adb8; text-transform:uppercase; letter-spacing:0.8px;\">Lease renewal<\u002Fdiv>\n            <div style=\"font-size:13px; font-weight:600; margin-top:4px; color:{{ sel.renewColor }};\">{{ sel.renewal }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#ffffff; border:1px solid #e2e0db; border-radius:10px; padding:12px 14px;\">\n            <div style=\"font-size:10px; color:#a8adb8; text-transform:uppercase; letter-spacing:0.8px;\">CAPEX<\u002Fdiv>\n            <div style=\"font-size:13px; font-weight:600; margin-top:4px;\">{{ sel.capex }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;gopRedBelow&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 81, &quot;min&quot;: 60, &quot;max&quot;: 95, &quot;unit&quot;: &quot;%&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Alert thresholds&quot;},\n  &quot;gopGreenAbove&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 97, &quot;min&quot;: 85, &quot;max&quot;: 110, &quot;unit&quot;: &quot;%&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Alert thresholds&quot;},\n  &quot;showSuspended&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Content&quot;}\n}\">\nclass Component extends DCLogic {\n  state = { data: null, dim: 'region', region: 'All', seg: 'All', alert: 'All', shown: 15, selId: null, methodOpen: false, renewTab: 'High' };\n\n  componentDidMount() {\n    fetch('data/portfolio.json').then(r => r.json()).then(data => this.setState({ data }));\n  }\n\n  money(v) {\n    if (v == null) return '—';\n    const a = Math.abs(v), sign = v < 0 ? '−' : '';\n    if (a >= 1e6) return sign + '¥' + (a / 1e6).toFixed(1) + 'M';\n    return sign + '¥' + Math.round(a / 1e3) + 'k';\n  }\n  pct(v, d) { return v == null ? '—' : (v * 100).toFixed(d == null ? 1 : d) + '%'; }\n  lightColor(l) { return l === 'R' ? '#b54334' : l === 'Y' ? '#b07d10' : l === 'G' ? '#226e4e' : '#c9cdd4'; }\n\n  computeLights(s, thrRed, thrGreen) {\n    const gop = s.gopAch == null ? null : (s.gopAch < thrRed ? 'R' : s.gopAch <= thrGreen ? 'Y' : 'G');\n    const eb = s.ebitda == null ? null : (s.ebitda < 0 ? 'R' : s.ebitda < 0.05 ? 'Y' : 'G');\n    const rgi = s.rgi == null ? null : (s.rgi < 0.8 ? 'R' : s.rgi < 0.95 ? 'Y' : 'G');\n    const ren = s.renewal == null ? null : (s.renewal === 'High' ? 'R' : s.renewal === 'Watch' ? 'Y' : 'G');\n    const cap = s.lights ? s.lights.capex : null;\n    return { gop, eb, rgi, ren, cap };\n  }\n\n  pill(label, active, onClick) {\n    return { label, onClick, style: 'font-size:12px; font-family:inherit; cursor:pointer; border-radius:6px; padding:6px 12px; border:1px solid ' + (active ? '#0e6b6b' : '#dcdad4') + '; background:' + (active ? '#0e6b6b' : '#ffffff') + '; color:' + (active ? '#ffffff' : '#5a6070') + ';' };\n  }\n\n  renderVals() {\n    const d = this.state.data;\n    const thrRed = (this.props.gopRedBelow ?? 81) / 100;\n    const thrGreen = (this.props.gopGreenAbove ?? 97) / 100;\n    const showSuspended = this.props.showSuspended ?? true;\n    const empty = { kpi: {}, dimPills: [], dimRows: [], alertPills: [], regionPills: [], segPills: [], visible: [], renewPills: [], renewRows: [], capexRows: [], hasSel: false, sel: {}, methodOpen: false, thrRed: Math.round(thrRed * 100), thrGreen: Math.round(thrGreen * 100) };\n    if (!d) return empty;\n\n    let stores = d.stores;\n    if (!showSuspended) stores = stores.filter(s => !s.suspended);\n    const lightsOf = s => this.computeLights(s, thrRed, thrGreen);\n    const redsOf = L => Object.values(L).filter(x => x === 'R').length;\n\n    // KPIs\n    let r = 0, y = 0, g = 0, gopA = 0, gopB = 0, revA = 0, revB = 0, costA = 0, costB = 0, occS = 0, occBS = 0, occN = 0, rgiHi = 0, rgiN = 0, susp = 0;\n    for (const s of stores) {\n      const L = lightsOf(s);\n      if (L.gop === 'R') r++; else if (L.gop === 'Y') y++; else if (L.gop === 'G') g++;\n      if (s.gopActual != null && s.gopBudget != null) { gopA += s.gopActual; gopB += s.gopBudget; }\n      if (s.rev != null && s.revBudget != null) { revA += s.rev; revB += s.revBudget; }\n      if (s.cost != null && s.costBudget != null) { costA += s.cost; costB += s.costBudget; }\n      if (s.occ != null && !s.suspended) { occS += s.occ; occBS += (s.occBudget || 0); occN++; }\n      if (s.rgi != null) { rgiN++; if (s.rgi >= 0.95) rgiHi++; }\n      if (s.suspended) susp++;\n    }\n    const tot = r + y + g;\n    const seg = (n, c) => 'width:' + (tot ? (n / tot * 100) : 0) + '%; background:' + c + ';';\n    const portGop = gopB ? gopA / gopB : null;\n    const kpi = {\n      total: stores.length, suspended: susp, r, y, g,\n      rBar: seg(r, '#b54334'), yBar: seg(y, '#d9a13d'), gBar: seg(g, '#2e7d5b'),\n      gopAch: this.pct(portGop), gopColor: this.lightColor(portGop == null ? null : (portGop < thrRed ? 'R' : portGop <= thrGreen ? 'Y' : 'G')),\n      revAch: this.pct(revB ? revA / revB : null), costUse: this.pct(costB ? costA / costB : null),\n      occ: this.pct(occN ? occS / occN : null), occBudget: this.pct(occN ? occBS / occN : null),\n      rgiShare: rgiN ? Math.round(rgiHi / rgiN * 100) + '%' : '—'\n    };\n\n    // dimension rows\n    const dim = this.state.dim;\n    const keyOf = s => dim === 'region' ? s.region : dim === 'seg' ? s.seg : 'Brand ' + s.brand;\n    const groups = {};\n    for (const s of stores) { const k = keyOf(s); (groups[k] = groups[k] || []).push(s); }\n    const dimRows = Object.entries(groups).map(([name, list]) => {\n      let rr = 0, yy = 0, gg = 0, ga = 0, gb = 0;\n      for (const s of list) {\n        const L = lightsOf(s);\n        if (L.gop === 'R') rr++; else if (L.gop === 'Y') yy++; else if (L.gop === 'G') gg++;\n        if (s.gopActual != null && s.gopBudget != null) { ga += s.gopActual; gb += s.gopBudget; }\n      }\n      const t = rr + yy + gg || 1;\n      const ach = gb ? ga / gb : null;\n      return {\n        name, n: list.length,\n        rBar: 'width:' + (rr / t * 100) + '%; background:#b54334;', yBar: 'width:' + (yy / t * 100) + '%; background:#d9a13d;', gBar: 'width:' + (gg / t * 100) + '%; background:#2e7d5b;',\n        counts: rr + ' · ' + yy + ' · ' + gg, tip: name + ': ' + rr + ' red, ' + yy + ' yellow, ' + gg + ' green of ' + list.length,\n        gop: this.pct(ach, 0), gopColor: this.lightColor(ach == null ? null : (ach < thrRed ? 'R' : ach <= thrGreen ? 'Y' : 'G')), _ach: ach ?? 9\n      };\n    }).sort((a, b) => a._ach - b._ach);\n\n    const dimPills = [['region', 'By region'], ['seg', 'By segment'], ['brand', 'By brand']].map(([k, l]) => this.pill(l, dim === k, () => this.setState({ dim: k })));\n\n    // filters\n    const regions = ['All', 'East', 'North', 'West', 'South', 'Central', 'Northeast', 'Other'];\n    const regionPills = regions.map(k => this.pill(k, this.state.region === k, () => this.setState({ region: k, shown: 15 })));\n    const segs = ['All', 'Economy', 'Midscale', 'Upper Midscale'];\n    const segPills = segs.map(k => this.pill(k, this.state.seg === k, () => this.setState({ seg: k, shown: 15 })));\n    const alerts = [['All', 'All'], ['3', '3+ red'], ['2', '2+ red'], ['1', '1+ red'], ['0', 'No red']];\n    const alertPills = alerts.map(([k, l]) => this.pill(l, this.state.alert === k, () => this.setState({ alert: k, shown: 15 })));\n\n    // table\n    let filtered = stores.map(s => ({ s, L: lightsOf(s) }));\n    filtered.forEach(x => x.reds = redsOf(x.L));\n    if (this.state.region !== 'All') filtered = filtered.filter(x => x.s.region === this.state.region);\n    if (this.state.seg !== 'All') filtered = filtered.filter(x => x.s.seg === this.state.seg);\n    if (this.state.alert !== 'All') { const n = parseInt(this.state.alert); filtered = n === 0 ? filtered.filter(x => x.reds === 0) : filtered.filter(x => x.reds >= n); }\n    filtered.sort((a, b) => b.reds - a.reds || (a.s.gopAch ?? 9) - (b.s.gopAch ?? 9));\n\n    const dotNames = { gop: 'GOP achievement', eb: 'Rolling-12m EBITDA%', rgi: 'RGI (Feb)', ren: 'Lease renewal', cap: 'CAPEX' };\n    const mkDots = (L) => Object.entries(L).map(([k, v]) => ({\n      tip: dotNames[k] + ': ' + (v === 'R' ? 'red' : v === 'Y' ? 'yellow' : v === 'G' ? 'green' : 'not rated'),\n      style: 'display:inline-block; width:11px; height:11px; border-radius:50%; background:' + (v ? this.lightColor(v) : '#eeece7') + '; border:1px solid ' + (v ? 'transparent' : '#dcdad4') + ';'\n    }));\n\n    const visible = filtered.slice(0, this.state.shown).map(({ s, L, reds }) => ({\n      id: s.id, label: s.seg + ' · Brand ' + s.brand + ' · ' + s.region + (s.suspended ? ' · closed' : ''),\n      rooms: s.rooms ?? '—',\n      gop: this.pct(s.gopAch, 0),\n      gopBar: 'height:100%; border-radius:3px; width:' + Math.max(0, Math.min(100, (s.gopAch ?? 0) * 100)) + '%; background:' + this.lightColor(L.gop) + ';',\n      gopColor: this.lightColor(L.gop),\n      eb: this.pct(s.ebitda, 1), ebColor: this.lightColor(L.eb),\n      rgi: s.rgi == null ? '—' : s.rgi.toFixed(2), rgiColor: this.lightColor(L.rgi),\n      dots: mkDots(L), reds,\n      redBadge: 'display:inline-block; min-width:24px; text-align:center; font-size:12px; font-weight:600; border-radius:6px; padding:3px 6px; ' + (reds >= 3 ? 'background:#b54334; color:#fff;' : reds > 0 ? 'background:#f9e9e6; color:#b54334;' : 'background:#e4f0ea; color:#226e4e;'),\n      select: () => this.setState({ selId: s.id })\n    }));\n\n    // drill-down\n    const selStore = this.state.selId ? stores.find(s => s.id === this.state.selId) : null;\n    let sel = {};\n    if (selStore) {\n      const s = selStore, L = lightsOf(s);\n      const gopGap = (s.gopActual != null && s.gopBudget != null) ? s.gopActual - s.gopBudget : null;\n      const revGap = (s.rev != null && s.revBudget != null) ? s.rev - s.revBudget : null;\n      const costGap = (s.cost != null && s.costBudget != null) ? s.cost - s.costBudget : null;\n      const occGapPp = (s.occ != null && s.occBudget != null) ? (s.occ - s.occBudget) * 100 : null;\n      const chips = [['GOP', L.gop, this.pct(s.gopAch, 0)], ['EBITDA', L.eb, this.pct(s.ebitda, 1)], ['RGI', L.rgi, s.rgi == null ? '—' : s.rgi.toFixed(2)], ['Renewal', L.ren, s.renewal || '—'], ['CAPEX', L.cap, s.capex || '—']].map(([n, l, v]) => ({\n        label: n + ' ' + v, tip: n + ': ' + (l === 'R' ? 'red' : l === 'Y' ? 'yellow' : l === 'G' ? 'green' : 'not rated'),\n        dot: 'display:inline-block; width:8px; height:8px; border-radius:50%; background:' + (l ? this.lightColor(l) : '#dcdad4') + ';',\n        style: 'display:inline-flex; align-items:center; gap:6px; font-size:11px; color:#3a3f4a; border:1px solid #e2e0db; background:#ffffff; border-radius:6px; padding:5px 9px;'\n      }));\n      // verdict\n      let verdict;\n      const revShort = revGap != null && revGap < 0 ? -revGap : 0;\n      const costOver = costGap != null && costGap > 0 ? costGap : 0;\n      if (gopGap == null) verdict = 'Insufficient data to attribute the result.';\n      else if (gopGap >= 0) verdict = 'GOP is on or above budget. No escalation required; monitor RGI and renewal timeline.';\n      else {\n        const revDriven = revShort >= costOver;\n        let sub;\n        if (revDriven) {\n          const occDriven = occGapPp != null && s.rpAch != null && (s.occBudget ? (s.occ / s.occBudget) : 1) <= s.rpAch;\n          sub = occDriven\n            ? 'Within revenue, occupancy runs ' + Math.abs(occGapPp).toFixed(1) + 'pp below budget while rate holds closer to plan — a volume problem. Review demand mix, OTA visibility and comp-set pricing before touching ADR.'\n            : 'Within revenue, RevPAR achievement (' + this.pct(s.rpAch, 0) + ') lags occupancy — a rate problem. Review pricing strategy and RGI positioning against the comp set.';\n          verdict = 'The miss is revenue-driven: ' + this.money(revShort) + ' short of budgeted revenue vs ' + this.money(costOver) + ' of cost overrun. ' + sub;\n        } else {\n          verdict = 'The miss is cost-driven: costs overran budget by ' + this.money(costOver) + ' against a revenue shortfall of ' + this.money(revShort) + '. Decompose the L3 expense lines — labour, energy, rooms and sales fees — with the store GM.';\n        }\n        verdict += ' Escalation: ' + (redsOf(L) >= 3 ? 'operating review meeting with store GM and regional manager.' : 'standard monthly review.');\n      }\n      sel = {\n        id: s.id, label: s.seg + ' · Brand ' + s.brand + ' · ' + s.region, rooms: s.rooms ?? '—', open: s.open || '—', suspended: !!s.suspended,\n        chips,\n        gopGap: gopGap == null ? '—' : (gopGap >= 0 ? '+' : '') + this.money(gopGap).replace('−', '−'), gopGapColor: gopGap != null && gopGap < 0 ? '#b54334' : '#226e4e',\n        gopLine: 'Actual ' + this.money(s.gopActual) + ' vs budget ' + this.money(s.gopBudget) + ' (' + this.pct(s.gopAch, 0) + ' achievement)',\n        revGap: revGap == null ? '—' : (revGap >= 0 ? '+' : '') + this.money(revGap), revGapColor: revGap != null && revGap < 0 ? '#b54334' : '#226e4e',\n        occ: this.pct(s.occ, 1), occVs: s.occBudget == null ? '' : 'vs ' + this.pct(s.occBudget, 1) + ' budget',\n        rp: s.rp == null ? '—' : '¥' + Math.round(s.rp), rpVs: s.rpAch == null ? '' : this.pct(s.rpAch, 0) + ' of budget',\n        adr: s.adr == null ? '—' : '¥' + Math.round(s.adr), rgiLine: s.rgi == null ? '' : 'RGI ' + s.rgi.toFixed(2),\n        costGap: costGap == null ? '—' : (costGap > 0 ? '+' : '') + this.money(costGap), costGapColor: costGap != null && costGap > 0 ? '#b54334' : '#226e4e',\n        costLine: 'Cost usage ' + this.pct(s.costUse, 0) + ' of budget' + (costGap != null && costGap > 0 ? ' — overrun; check labour, energy, rooms and sales-fee lines' : ''),\n        verdict,\n        renewal: s.renewal || 'Not in window', renewColor: s.renewal === 'High' ? '#b54334' : s.renewal === 'Watch' ? '#b07d10' : '#3a3f4a',\n        capex: s.capex || 'No active project'\n      };\n    }\n\n    // renewals\n    const renewPills = [['High', 'High risk'], ['Watch', 'Watch'], ['All', 'All']].map(([k, l]) => this.pill(l, this.state.renewTab === k, () => this.setState({ renewTab: k })));\n    let renewList = d.renewals.slice();\n    if (this.state.renewTab !== 'All') renewList = renewList.filter(x => this.state.renewTab === 'High' ? x.risk === 'High' : x.risk === 'Watch' || x.risk === 'High');\n    renewList.sort((a, b) => (a.daysLeft ?? 1e9) - (b.daysLeft ?? 1e9));\n    const badge = (risk) => 'flex-shrink:0; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.6px; border-radius:4px; padding:3px 7px; ' + (risk === 'High' ? 'background:#f9e9e6; color:#b54334;' : risk === 'Watch' ? 'background:#f6efdc; color:#b07d10;' : 'background:#e4f0ea; color:#226e4e;');\n    const renewRows = renewList.slice(0, 30).map(x => ({\n      id: x.id, region: x.region, risk: x.risk, badge: badge(x.risk),\n      owner: x.owner || 'owner n/a',\n      sub: x.type + (x.obstacles.length ? ' · ' + x.obstacles.join(', ') : ''),\n      days: x.daysLeft == null ? '—' : x.daysLeft, daysColor: x.daysLeft != null && x.daysLeft < 180 ? '#b54334' : '#3a3f4a'\n    }));\n\n    // capex\n    const cap = d.capex.slice().sort((a, b) => (a.health === 'Delayed' ? 0 : 1) - (b.health === 'Delayed' ? 0 : 1) || b.progress - a.progress);\n    const delayed = d.capex.filter(c => c.health === 'Delayed' || c.preStage !== 'On track').length;\n    const capexRows = cap.map(c => ({\n      id: c.id, stage: c.stage + (c.inBudget ? ' · FY25 tender budget' : ''),\n      health: c.health === 'Delayed' ? 'Delayed' : c.preStage === 'Paused' ? 'Paused' : c.preStage === 'Behind' ? 'Behind plan' : c.health,\n      badge: 'flex-shrink:0; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.6px; border-radius:4px; padding:3px 7px; ' + ((c.health === 'Delayed' || c.preStage !== 'On track') ? 'background:#f9e9e6; color:#b54334;' : c.health === 'Not started' ? 'background:#f1efe9; color:#7a8090;' : 'background:#e4f0ea; color:#226e4e;'),\n      bar: 'height:100%; border-radius:3px; width:' + c.progress + '%; background:' + ((c.health === 'Delayed' || c.preStage !== 'On track') ? '#b54334' : '#0e6b6b') + ';',\n      progress: c.progress + '%'\n    }));\n\n    return {\n      kpi, dimPills, dimRows, alertPills, regionPills, segPills, visible,\n      shownCount: Math.min(this.state.shown, filtered.length), filteredCount: filtered.length,\n      showMore: () => this.setState(st => ({ shown: st.shown + 30 })),\n      hasSel: !!selStore, sel, closeSel: () => this.setState({ selId: null }),\n      renewPills, renewRows, capexRows,\n      capexSummary: d.capex.length + ' projects · ' + delayed + ' flagged',\n      methodOpen: this.state.methodOpen, toggleMethod: () => this.setState(st => ({ methodOpen: !st.methodOpen })),\n      methodChevron: 'display:inline-block; font-size:12px; color:#7a8090; transition:transform 0.2s; transform:rotate(' + (this.state.methodOpen ? '180deg' : '0deg') + ');',\n      thrRed: Math.round(thrRed * 100), thrGreen: Math.round(thrGreen * 100)\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
